$kind: http-request
url: "{{baseUrl}}/api/loans/{{loanId}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "id": {{loanId}},
      "lender": { "id": {{userId}} },
      "borrower": { "id": {{borrowerId}} },
      "amount": 5000.0,
      "balance": 5000.0,
      "dueDate": "2026-12-31",
      "status": "PENDING"
    }
order: 7000
