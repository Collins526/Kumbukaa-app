$kind: http-request
url: "{{baseUrl}}/api/loans/request"
method: POST
headers:
  Authorization: Bearer {{bearerToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "lenderPhone": "{{lenderPhone}}",
      "amount": 7000,
      "dueDate": "2026-06-30"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
scripts:
  - type: beforeRequest
    code: pm.test('bearerToken is present', function () { pm.expect(pm.environment.get('bearerToken')).to.be.a('string').and.not.empty; });
    language: text/javascript
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.id) pm.environment.set('loanId', jsonData.id);
      pm.test('Loan request submitted successfully', function () { pm.expect(jsonData.id).to.be.a('number'); });
    language: text/javascript
order: 3000
