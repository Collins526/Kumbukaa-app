$kind: http-request
url: "{{baseUrl}}/api/loans?lenderId={{lenderUserId}}&borrowerId={{borrowerUserId}}&amount=5000"
method: POST
headers:
  Authorization: Bearer {{token}}
queryParams:
  lenderId: "{{lenderUserId}}"
  borrowerId: "{{borrowerUserId}}"
  amount: "5000"
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.id) pm.environment.set('loanId', jsonData.id);
      pm.test('Loan created successfully', function () { pm.expect(jsonData.id).to.be.a('number'); });
    language: text/javascript
order: 3000
