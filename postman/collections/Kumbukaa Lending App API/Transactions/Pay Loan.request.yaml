$kind: http-request
url: "{{baseUrl}}/api/transactions"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "loanId": {{loanId}},
      "amount": 1500.0,
      "mpesaCode": "MPESA123"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.id) pm.environment.set('transactionId', jsonData.id);
      pm.test('Loan payment recorded successfully', function () { pm.expect(jsonData.id).to.be.a('number'); });
    language: text/javascript
order: 1000
