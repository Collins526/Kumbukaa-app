$kind: http-request
url: "{{baseUrl}}/api/lender/{{lenderId}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "id": {{lenderId}},
      "user": { "id": {{userId}} },
      "lenderName": "Kumbukaa Lender",
      "availableCapital": 12000.0,
      "interestRate": 5.0,
      "dateOfBirth": "1990-01-01",
      "address": "123 Nairobi Ave",
      "city": "Nairobi",
      "postalCode": "00100",
      "isVerified": true
    }
order: 5000
