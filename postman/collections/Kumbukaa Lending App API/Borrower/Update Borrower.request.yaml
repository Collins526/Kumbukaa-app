$kind: http-request
url: "{{baseUrl}}/api/borrower/{{borrowerId}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "id": {{borrowerId}},
      "user": { "id": {{userId}} },
      "creditScore": 700,
      "idNumber": "1234567890",
      "employmentStatus": "EMPLOYED",
      "annualIncome": 30000.0,
      "dateOfBirth": "1992-05-10",
      "address": "456 Market St",
      "city": "Nairobi",
      "postalCode": "00100",
      "isVerified": true,
      "totalBorrowed": 1000.0,
      "totalRepaid": 500.0
    }
order: 6000
