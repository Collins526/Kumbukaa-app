spring.config.import=optional:dotenv:./.env
spring.application.name=kumbukaa
server.servlet.context-path=/kumbukaa

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kumbukaa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false

# Server
server.port=8080

# JWT
app.jwt.secret=${APP_JWT_SECRET:kumbukaa-lending-app-secret-key-spring-boot-security-jwt-authentication}
app.jwt.expiration=86400000
app.jwt.refresh.expiration=604800000

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Resend email provider
app.resend.api-key=${APP_RESEND_API_KEY:}
app.resend.from-email=${APP_RESEND_FROM_EMAIL:onboarding@resend.dev}

# Actuator health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
