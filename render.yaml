services:
  - type: web
    name: kumbuka
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        description: JDBC connection URL for production database
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        description: Database user name for production
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        description: Database password for production
        sync: false
      - key: APP_JWT_SECRET
        description: JWT signing secret for production
        sync: false
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
        description: SMTP host for email delivery
        sync: false
      - key: SPRING_MAIL_PORT
        value: "587"
        description: SMTP port for email delivery
        sync: false
      - key: SPRING_MAIL_USERNAME
        description: Email username for notifications
        sync: false
      - key: SPRING_MAIL_PASSWORD
        description: Email password or app password for notifications
        sync: false
      - key: SPRING_MAIL_SMTP_AUTH
        value: "true"
        description: SMTP auth enabled
        sync: false
      - key: SPRING_MAIL_STARTTLS_ENABLE
        value: "true"
        description: SMTP STARTTLS enabled
        sync: false
      - key: APP_RESEND_API_KEY
        description: Resend API key used by the email service
        sync: false
      - key: APP_RESEND_FROM_EMAIL
        value: onboarding@resend.dev
        description: Verified sender email address for Resend
        sync: false
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    buildCommand: ""
    startCommand: ""
    healthCheckPath: /health
    buildFilter:
      paths:
        - source: /
          destination: /
    autoDeploy: true
